{% extends "base.html" %}

{% block title %}Đăng nhập - NL Tea{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-left">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="NL Tea Logo" class="login-big-logo">
    </div>

    <div class="login-box">
        <h2>Welcome</h2>
        <h4>STORE</h4>

        <form method="POST" action="{{ url_for('main.login') }}">
            <div class="input-group-custom">
                <span class="icon">👤</span>
                <input type="text" name="username" placeholder="Tên đăng nhập" required>
            </div>

            <div class="input-group-custom">
                <span class="icon">🔒</span>
                <input type="password" name="password" placeholder="Mật khẩu" required>
            </div>

            <button type="submit" class="login-btn">ĐĂNG NHẬP</button>
        </form>

        <div class="login-links">
            <a href="{{ url_for('main.register') }}">Đăng ký tài khoản</a>
        </div>

        <div class="login-demo small text-start mt-3">
            <strong>Tài khoản mẫu:</strong><br>
            Admin: <code>admin</code> / <code>admin123</code><br>
            Khách: <code>khach</code> / <code>123456</code>
        </div>

    </div>
</div>
{% endblock %}
