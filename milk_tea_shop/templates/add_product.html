{% extends "base.html" %}
{% block title %}Thêm món - Milkea{% endblock %}
{% block content %}
<section class="container py-5">
    <div class="auth-card mx-auto shadow-sm">
        <h1 class="fw-bold mb-3">Thêm món mới</h1>
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Tên món</label>
                <input type="text" class="form-control" name="name" placeholder="Ví dụ: Trà sữa matcha" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Loại món</label>
                <select class="form-select" name="category">
                    {% for c in categories %}
                    <option>{{ c }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Size</label>
                <input type="text" class="form-control" name="size" value="M/L">
            </div>
            <div class="mb-3">
                <label class="form-label">Topping</label>
                <input type="text" class="form-control" name="topping" value="Không">
            </div>
            <div class="mb-3">
                <label class="form-label">Giá</label>
                <input type="number" class="form-control" name="price" placeholder="35000" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mô tả</label>
                <textarea class="form-control" name="description" rows="3"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Ảnh món</label>
                <input type="file" class="form-control" name="image" accept="image/*">
            </div>
            <button type="submit" class="btn btn-brown w-100">Lưu món</button>
        </form>
    </div>
</section>
{% endblock %}
